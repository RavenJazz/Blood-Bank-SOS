<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Blood – Circulate^PH</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .request-form { padding: 24px; display: flex; flex-direction: column; gap: 24px; }
    .blood-type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .blood-option {
      aspect-ratio: 1; border: 2px solid var(--outline-variant); border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px;
      cursor: pointer; transition: all 0.2s; background: var(--surface-low);
    }
    .blood-option.selected { border-color: var(--primary); background: #fff8f7; color: var(--primary); box-shadow: var(--shadow-red); }
    
    .stepper { display: flex; align-items: center; justify-content: space-between; background: var(--surface-low); border: 2px solid var(--outline-variant); border-radius: var(--radius); padding: 8px; }
    .step-btn { width: 44px; height: 44px; border-radius: var(--radius); background: var(--white); border: 1.5px solid var(--outline-variant); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .step-btn:hover { border-color: var(--primary); color: var(--primary); }
    .step-val { font-size: 24px; font-weight: 700; color: var(--on-surface); }

    .urgency-row { display: flex; gap: 10px; }
    .urgency-btn {
      flex: 1; padding: 12px; border-radius: var(--radius-full); border: 2px solid var(--outline-variant);
      text-align: center; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
      text-transform: uppercase; letter-spacing: 0.05em; background: var(--surface-low);
    }
    .urgency-btn.selected[data-level="critical"] { background: var(--primary); color: white; border-color: var(--primary); }
    .urgency-btn.selected[data-level="urgent"] { background: var(--secondary); color: white; border-color: var(--secondary); }
    .urgency-btn.selected[data-level="scheduled"] { background: var(--tertiary); color: white; border-color: var(--tertiary); }

    .upload-box {
      border: 2px dashed var(--outline-variant); border-radius: var(--radius-lg); padding: 32px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center;
      background: var(--surface-low); cursor: pointer; transition: all 0.2s;
    }
    .upload-box:hover { border-color: var(--primary); background: var(--primary-glow); }
    .upload-icon { width: 48px; height: 48px; color: var(--outline); }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="phone-frame">
    <!-- Top Nav -->
    <div class="top-nav">
      <a href="profile.html" class="back-btn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="headline-md" style="font-size: 18px;">Request Blood</div>
      <div style="width:40px"></div>
    </div>

    <div class="scroll-content">
      <div class="request-form">
        <div class="input-group">
          <label>Required Blood Type</label>
          <div class="blood-type-grid" id="bloodGrid">
            <div class="blood-option" onclick="selectBlood(this)">A+</div>
            <div class="blood-option" onclick="selectBlood(this)">A-</div>
            <div class="blood-option" onclick="selectBlood(this)">B+</div>
            <div class="blood-option" onclick="selectBlood(this)">B-</div>
            <div class="blood-option" onclick="selectBlood(this)">AB+</div>
            <div class="blood-option" onclick="selectBlood(this)">AB-</div>
            <div class="blood-option" onclick="selectBlood(this)">O+</div>
            <div class="blood-option" onclick="selectBlood(this)">O-</div>
          </div>
        </div>

        <div class="input-group">
          <label>Units Needed</label>
          <div class="stepper">
            <button class="step-btn" onclick="changeStep(-1)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <div class="step-val" id="unitVal">2</div>
            <button class="step-btn" onclick="changeStep(1)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y2="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>

        <div class="input-group">
          <label>Hospital Location</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <input type="text" placeholder="Enter hospital name or address" value="Makati Medical Center">
          </div>
        </div>

        <div class="input-group">
          <label>Urgency Level</label>
          <div class="urgency-row" id="urgencyRow">
            <div class="urgency-btn" data-level="critical" onclick="selectUrgency(this)">Critical</div>
            <div class="urgency-btn selected" data-level="urgent" onclick="selectUrgency(this)">Urgent</div>
            <div class="urgency-btn" data-level="scheduled" onclick="selectUrgency(this)">Scheduled</div>
          </div>
        </div>

        <div class="input-group">
          <label>Upload Hospital Request</label>
          <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <div class="label-bold">Tap to upload request</div>
            <div class="body-base" style="font-size: 12px;">JPG, PNG or PDF (Max 5MB)</div>
            <input type="file" id="fileInput" style="display:none">
          </div>
        </div>
        
        <div style="height: 40px;"></div>
      </div>
    </div>

    <div class="bottom-action">
      <button class="btn btn-primary" onclick="findDonors()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Find Donors Now
      </button>
    </div>
  </div>
</div>

<div class="toast-container"><div class="toast" id="toastEl"></div></div>

<script>
  let units = 2;
  
  function selectBlood(el) {
    document.querySelectorAll('.blood-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
  }
  
  function changeStep(delta) {
    units = Math.max(1, Math.min(20, units + delta));
    document.getElementById('unitVal').textContent = units;
  }
  
  function selectUrgency(el) {
    document.querySelectorAll('.urgency-btn').forEach(btn => btn.classList.remove('selected'));
    el.classList.add('selected');
  }

  function findDonors() {
    const selectedBlood = document.querySelector('.blood-option.selected')?.textContent || 'O-';
    const btn = event.currentTarget;
    const originalContent = btn.innerHTML;
    btn.innerHTML = '<div class="spinner show"></div> Searching…';
    btn.disabled = true;
    
    setTimeout(() => {
      window.location.href = `matching_results.html?type=${encodeURIComponent(selectedBlood)}`;
    }, 1500);
  }
  
  // Initial select
  document.querySelector('.blood-option').click();
</script>
</body>
</html>
