<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulate^PH – Login</title>
  <meta name="description" content="Log in to Circulate^PH — the Philippines' urgent blood coordination platform." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .login-hero {
      background: linear-gradient(155deg, #9e2016 0%, #C0392B 60%, #e74c3c 100%);
      padding: 52px 24px 36px;
      position: relative;
      overflow: hidden;
    }
    .login-hero::before {
      content:''; position:absolute; top:-50px; right:-50px;
      width:250px; height:250px; border-radius:50%;
      background:rgba(255,255,255,0.06);
    }
    .login-hero::after {
      content:''; position:absolute; bottom:-70px; left:-40px;
      width:200px; height:200px; border-radius:50%;
      background:rgba(255,255,255,0.04);
    }
    .hero-inner { position:relative; z-index:2; }
    .brand-row { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
    .logo-pill {
      width:42px; height:42px;
      background:rgba(255,255,255,0.18);
      border:1.5px solid rgba(255,255,255,0.3);
      border-radius:var(--radius);
      display:flex; align-items:center; justify-content:center;
    }
    .logo-pill svg { width:24px; height:24px; stroke:white; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
    .brand-name { font-size:20px; font-weight:800; color:white; letter-spacing:-0.04em; }
    .login-hero h1 { font-size:30px; font-weight:800; color:white; line-height:1.18; letter-spacing:-0.02em; }
    .hero-sub { font-size:14px; color:rgba(255,255,255,0.78); margin-top:8px; line-height:1.5; }
    .drop-deco { position:absolute; right:16px; bottom:12px; opacity:0.18; z-index:0; }
    .login-content { padding:28px 24px 0; display:flex; flex-direction:column; gap:16px; }
    .social-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      height:52px; border-radius:var(--radius);
      border:1.5px solid var(--outline-variant); background:var(--white);
      font-family:var(--font); font-size:14px; font-weight:600; color:var(--on-surface);
      cursor:pointer; transition:border-color .2s, background .2s;
    }
    .social-btn:hover { border-color:var(--charcoal); background:var(--surface-low); }
    .or-divider { display:flex; align-items:center; gap:12px; }
    .or-divider::before,.or-divider::after { content:''; flex:1; height:1px; background:var(--outline-variant); }
    .or-divider span { font-size:11px; font-weight:600; color:var(--outline); letter-spacing:.1em; text-transform:uppercase; }
    .forgot-row { text-align:right; }
    .forgot-row a { font-size:13px; font-weight:600; color:var(--on-surface-variant); text-decoration:none; }
    .forgot-row a:hover { color:var(--primary); }
    .login-footer { text-align:center; font-size:14px; color:var(--on-surface-variant); padding:20px 24px 40px; }
    .err-msg { font-size:12px; color:var(--error); font-weight:500; display:none; margin-top:3px; }
    .has-error input { border-color:var(--error) !important; }
    .has-error .err-msg { display:block; }
  </style>
</head>
<body>
<div class="app-shell">
 <div class="phone-frame">
  <div class="login-hero">
    <div class="hero-inner">
      <div class="brand-row">
        <div class="logo-pill">
          <svg viewBox="0 0 24 24"><path d="M12 2C12 2 5 9.5 5 14a7 7 0 0 0 14 0C19 9.5 12 2 12 2z"/></svg>
        </div>
        <span class="brand-name">Circulate<sup style="font-size:11px">PH</sup></span>
      </div>
      <h1>Welcome<br>Back.</h1>
      <p class="hero-sub">Every second counts.<br>Log in to save lives today.</p>
    </div>
    <div class="drop-deco">
      <svg width="90" height="115" viewBox="0 0 90 115" fill="none">
        <path d="M45 8C45 8 8 50 8 73C8 94 24 108 45 108C66 108 82 94 82 73C82 50 45 8 45 8Z" fill="white"/>
      </svg>
    </div>
  </div>

  <div class="scroll-content">
    <div class="login-content">
      <button class="social-btn" onclick="handleSocial()" id="googleBtn">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="or-divider"><span>or</span></div>

      <div class="input-group" id="emailGrp">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          </span>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <span class="err-msg">Please enter a valid email address.</span>
      </div>

      <div class="input-group" id="pwGrp">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="password" placeholder="Enter your password" class="has-right-icon" autocomplete="current-password"/>
          <button class="input-icon-right" onclick="togglePw('password',this)" type="button" aria-label="Show password">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="err-msg">Password must be at least 8 characters.</span>
      </div>

      <div class="forgot-row">
        <a href="#" onclick="toast('Reset link sent! Check your inbox.','success');return false;">Forgot Password?</a>
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
        <span id="btnTxt">Log In</span>
        <div class="spinner" id="spin"></div>
      </button>
    </div>

    <div class="login-footer">
      New here? <a class="link-text" href="signup.html">Create an Account</a>
    </div>
  </div>
 </div>
</div>

<div class="toast-container"><div class="toast" id="toastEl"></div></div>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}
function toast(msg, type) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => el.className = 'toast', 3200);
}
function handleSocial() {
  toast('Redirecting to Google…','');
  setTimeout(() => window.location.href = 'onboarding.html', 1200);
}
function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const eg = document.getElementById('emailGrp');
  const pg = document.getElementById('pwGrp');
  eg.classList.remove('has-error'); pg.classList.remove('has-error');
  let ok = true;
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { eg.classList.add('has-error'); ok=false; }
  if (pw.length < 8) { pg.classList.add('has-error'); ok=false; }
  if (!ok) return;
  const btn = document.getElementById('loginBtn');
  document.getElementById('btnTxt').style.display='none';
  document.getElementById('spin').classList.add('show');
  btn.disabled = true;
  setTimeout(() => window.location.href = 'onboarding.html', 1500);
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
