<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Urgent Donor Notification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#ffb4a9",
                        "surface-bright": "#fcf8fb",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#eae7ea",
                        "on-primary-fixed-variant": "#8e130c",
                        "inverse-surface": "#303032",
                        "surface-container": "#f0edef",
                        "primary": "#9e2016",
                        "tertiary": "#475455",
                        "secondary-container": "#fea520",
                        "surface": "#fcf8fb",
                        "on-secondary-container": "#694000",
                        "on-surface": "#1b1b1d",
                        "primary-fixed": "#ffdad5",
                        "background": "#fcf8fb",
                        "primary-fixed-dim": "#ffb4a9",
                        "on-tertiary-fixed-variant": "#3d494a",
                        "on-secondary-fixed": "#2b1700",
                        "on-background": "#1b1b1d",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#e0edee",
                        "on-secondary-fixed-variant": "#663e00",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#bcc9ca",
                        "surface-container-low": "#f6f3f5",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#59413d",
                        "error": "#ba1a1a",
                        "surface-dim": "#dcd9dc",
                        "on-tertiary-fixed": "#121e1f",
                        "outline": "#8d706c",
                        "error-container": "#ffdad6",
                        "outline-variant": "#e1bfb9",
                        "inverse-on-surface": "#f3f0f2",
                        "secondary-fixed": "#ffddb9",
                        "surface-container-highest": "#e4e2e4",
                        "secondary-fixed-dim": "#ffb961",
                        "tertiary-fixed": "#d8e5e6",
                        "surface-variant": "#e4e2e4",
                        "on-primary-container": "#ffe5e1",
                        "tertiary-container": "#5f6c6d",
                        "surface-tint": "#b02d21",
                        "primary-container": "#c0392b",
                        "secondary": "#865300",
                        "on-primary-fixed": "#410000",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-gutter": "12px",
                        "unit": "8px",
                        "stack-gap": "16px",
                        "container-padding": "20px"
                    },
                    "fontFamily": {
                        "headline-md": ["Lexend"],
                        "display-lg": ["Lexend"],
                        "body-base": ["Lexend"],
                        "label-bold": ["Lexend"],
                        "blood-type": ["Lexend"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "30px", "fontWeight": "700" }],
                        "display-lg": ["34px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "18px", "fontWeight": "600" }],
                        "blood-type": ["64px", { "lineHeight": "64px", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col justify-center items-center px-container-padding font-body-base text-on-background relative overflow-hidden">
<!-- Ambient Background Effect -->
<div class="absolute inset-0 pointer-events-none z-0 flex items-center justify-center opacity-10">
<div class="w-[120vw] h-[120vw] bg-primary-container rounded-full blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-md z-10 flex flex-col items-center text-center space-y-8">
<!-- Header / Urgency Indicator -->
<header class="flex flex-col items-center space-y-4">
<div class="inline-flex items-center space-x-2 bg-error px-4 py-2 rounded-full shadow-lg">
<span class="material-symbols-outlined text-on-error" data-icon="emergency">emergency</span>
<span class="font-label-bold text-on-error tracking-wider uppercase">URGENT REQUEST NEARBY</span>
</div>
</header>
<!-- Blood Type Centerpiece -->
<section class="relative w-48 h-48 flex items-center justify-center rounded-full bg-surface-container-lowest border-4 border-error shadow-2xl">
<!-- Ripple effect rings -->
<div class="absolute inset-0 border-2 border-error rounded-full opacity-50 scale-110"></div>
<div class="absolute inset-0 border border-error rounded-full opacity-25 scale-125"></div>
<h1 class="font-blood-type text-blood-type text-error">O-</h1>
</section>
<!-- Details Box -->
<section class="w-full bg-surface-container-lowest rounded-xl p-6 shadow-md border border-surface-variant flex flex-col space-y-4 text-left">
<div class="flex items-start space-x-4">
<div class="p-3 bg-surface-container-low rounded-lg text-primary-container">
<span class="material-symbols-outlined text-3xl" data-icon="local_hospital" data-weight="fill" style="font-variation-settings: 'FILL' 1;">local_hospital</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">St. Luke's Medical Center</h2>
<p class="font-body-base text-body-base text-tertiary flex items-center mt-1">
<span class="material-symbols-outlined text-lg mr-1" data-icon="location_on">location_on</span>
                        2.5 km away
                    </p>
</div>
</div>
<div class="h-px w-full bg-surface-variant my-2"></div>
<div class="flex items-center justify-between">
<span class="font-label-bold text-label-bold text-tertiary uppercase tracking-wide">Urgency</span>
<span class="bg-primary-container text-on-primary px-3 py-1 rounded-full font-label-bold text-label-bold">Critical</span>
</div>
<div class="flex items-center justify-between mt-2">
<span class="font-label-bold text-label-bold text-tertiary uppercase tracking-wide">Patient</span>
<span class="font-body-base text-body-base text-on-surface">Emergency Surgery Trauma</span>
</div>
</section>
<!-- Action Buttons -->
<footer class="w-full flex flex-col space-y-4 pt-4">
<button class="w-full h-14 bg-primary-container hover:bg-primary text-on-primary font-headline-md text-headline-md rounded-lg shadow-lg flex items-center justify-center transition-colors">
<span class="material-symbols-outlined mr-2" data-icon="volunteer_activism" data-weight="fill" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
                I'll Donate
            </button>
<button class="w-full h-14 bg-transparent border-2 border-outline hover:bg-surface-container-low text-on-surface font-label-bold text-label-bold rounded-lg flex items-center justify-center transition-colors">
                Can't Help Now
            </button>
</footer>
</main>
</body></html>
